<section class="section">
  <div class="section-header">
    <h2 class="h2">Manage rooms</h2>
    <div class="actions">
      <button class="btn btn-ghost" (click)="cargarSalas()">Refresh</button>
      <button class="btn btn-danger" (click)="borrarTodasLasSalas()">Delete all</button>
    </div>
  </div>

  <!-- ✅ Search -->
  <div class="searchbar">
    <div class="searchicon" aria-hidden="true">⌕</div>
    <input
      class="searchinput"
      type="text"
      placeholder="Search by faculty…"
      [ngModel]="searchFaculty()"
      (ngModelChange)="searchFaculty.set($event)"
    />
    <button
      class="btn btn-ghost"
      type="button"
      *ngIf="searchFaculty().trim().length"
      (click)="searchFaculty.set('')">
      Clear
    </button>
  </div>

  <!-- Create room -->
  <div class="card inner-card">
    <h3 class="h3">Create a new room</h3>

    <div class="grid">
      <div class="field">
        <label class="label">Faculty</label>
        <input class="input" type="text" [(ngModel)]="nuevaSala.facultad" placeholder="e.g., Teleco" />
      </div>

      <div class="field">
        <label class="label">Room number</label>
        <input class="input" type="number" [(ngModel)]="nuevaSala.numeroSala" placeholder="Number" />
      </div>

      <div class="field">
        <label class="label">People inside</label>
        <input class="input" type="number" [(ngModel)]="nuevaSala.personasDentro" />
      </div>

      <div class="field">
        <label class="label">Noise (dB)</label>
        <input class="input" type="number" [(ngModel)]="nuevaSala.ruidoDb" />
      </div>

      <div class="field">
        <label class="label">Entry time</label>
        <input class="input" type="datetime-local" [(ngModel)]="nuevaSala.horaEntrada" />
      </div>

      <div class="field">
        <label class="label">Exit time</label>
        <input class="input" type="datetime-local" [(ngModel)]="nuevaSala.horaSalida" />
      </div>
    </div>

    <div class="row">
      <button class="btn btn-primary" (click)="crearSala()">Create room</button>
    </div>
  </div>

  <!-- Rooms list -->
  <div class="card inner-card">
    <div class="table-header">
      <h3 class="h3">Existing rooms</h3>
      <span class="muted">{{ filteredSalas().length }} rooms</span>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Faculty</th>
            <th>Room</th>
            <th>People</th>
            <th>Noise</th>
            <th>Entry</th>
            <th>Exit</th>
            <th style="width: 170px;">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let sala of filteredSalas()">
            <td><input class="cell-input" type="text" [(ngModel)]="sala.facultad"></td>
            <td><input class="cell-input" type="number" [(ngModel)]="sala.numeroSala"></td>
            <td><input class="cell-input" type="number" [(ngModel)]="sala.personasDentro"></td>
            <td><input class="cell-input" type="number" [(ngModel)]="sala.ruidoDb"></td>
            <td><input class="cell-input" type="datetime-local" [(ngModel)]="sala.horaEntrada"></td>
            <td><input class="cell-input" type="datetime-local" [(ngModel)]="sala.horaSalida"></td>
            <td class="cell-actions">
              <button class="btn btn-save" (click)="actualizarSala(sala)">Save</button>
              <button class="btn btn-danger" (click)="eliminarSala(sala._id!)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
